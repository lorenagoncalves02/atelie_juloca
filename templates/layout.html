<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelie JuLoCa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/layout.css">
   <link rel="stylesheet" href="../static/geral.css">
   <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_cart" />
   
   {%block css_pessoal%} {% endblock %}
    


</head>
<body>
  
     <!-- header -->
     <header class="header-jlc">
        <div class="header-logo">
            <img src="../static/img/logo.png" alt="logo" width="300px" >
        </div>

        <nav class="header-topicos" id="lista_topicos">
            <ul class="header-lista" id="lista-cat">
                <li><a href="/">Pagina Inicial</a></li>
            </ul>
        </nav>
 

        <form class="form-header" role="search">
            <input class="form-header-inp" id="form-input" type="search" placeholder="Pesquise Aqui..." aria-label="Search"/>
            <button onclick="pesquisar()" type="button" class="form-header-button">Buscar</button>
        </form>

        <div class="header-iconL">
            <a href="/cadastro"><img src="../static/img/iconeL.png" alt="Iconel" width="50px"></a>
        </div>

        <div class="header-iconS">
            <a href="/logout"><img src="../static/img/saida.png" alt="Icones" width="50px"></a>
        </div>
     </header>
     <main>
    {% block content %}

    {% endblock %}
    </main>
    
    <a href="/" class="floating-btn" title="">
    <span class="btn-icon">↑</span> </a>

            <button class="header__cart-btn" onclick="toggleCart()">
            <span class="material-symbols-outlined">shopping_cart</span>
        </button>

        <aside class="cart" id="cart">

            <div class="cart__header">
                <strong style="color: black;">Seu Carrinho</strong>
                <span onclick="toggleCart()" style="cursor:pointer; color: black;">✖</span>
            </div>

            <div class="cart__items" id="cart-items">


            </div>

            <div class="cart__footer">
                <div class="cart__total" style="color: black;">
                    <strong style="color: black;" id="cart-total">Total:</strong>R$ 0,00
                </div>

                <button class="cart__btn">
                    Finalizar Pedido
                </button>
            </div>

        </aside>


        <script>
            
            function toggleCart() {
                const cart = document.getElementById("cart");
                cart.classList.toggle("active");
            }
        </script>

     <footer class="footer-jlc mt-auto py-3">
        <p>Todos direitos reservados</p>
        <div class="img-inst">
            <a href="https://www.instagram.com/"><img src="../static/img/iconeiG.png" alt="insta" width="100px"></a>

        </div>
     </footer>

     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <script src="{{ url_for('static',filename='header.js') }}"></script>
</body>
</html>
